name: evaluate-experiments

# Checks sprints/active.yml daily for any experiment whose evaluation_date
# has arrived. If current_reading is populated, archives it with a WINNER /
# NEUTRAL / LOSER verdict based on the configured thresholds. If no
# current_reading exists, opens a GitHub Issue tagging the maintainer so
# Lisa's next scan knows to measure and push a reading.

on:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC (early morning US / mid-day EU)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Exit codes: 0 = OK (evaluated everything due, or nothing due),
      # 3 = some due experiments lack a post-window reading (partial results
      # may still have been written), anything else = crash.
      - name: Run evaluator
        id: eval
        run: |
          set +e
          python scripts/evaluate_experiment.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ] && [ "$code" -ne 3 ]; then exit "$code"; fi
        continue-on-error: true

      - name: Commit and push
        if: steps.eval.outputs.exit_code == '0' || steps.eval.outputs.exit_code == '3'
        run: |
          git config user.name  "lisa-dashboard-bot"
          git config user.email "lisa-dashboard-bot@users.noreply.github.com"
          git add sprints/active.yml sprints/archive.yml logs/runs.jsonl
          if git diff --cached --quiet; then
            echo "No experiments ready for evaluation today"
          else
            git commit -m "eval: archive experiments whose window closed"
            git push
          fi

      # Self-heal: once the evaluator runs clean, close any open
      # needs-attention issue instead of leaving it dangling.
      - name: Close attention issue if evaluator is healthy
        if: steps.eval.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'lisa,evaluation',
              state: 'open',
              per_page: 10,
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Evaluator ran clean today — closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      # One open issue at a time — if a previous "evaluation needs attention"
      # issue is still open, don't file another.
      - name: Open issue if evaluator needs attention
        if: steps.eval.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'lisa,evaluation',
              state: 'open',
              per_page: 1,
            });
            if (existing.length > 0) {
              core.info(`Issue #${existing[0].number} already open — not filing a duplicate.`);
              return;
            }
            const today = new Date().toISOString().split('T')[0];
            const code = '${{ steps.eval.outputs.exit_code }}';
            const cause = code === '3'
              ? 'One or more experiments reached their `evaluation_date` but have no usable `current_reading` (missing, or measured before the window closed). Lisa\'s next scan needs to push a fresh reading.'
              : 'The evaluator crashed — check the workflow logs.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Experiment evaluation needs attention (since ${today})`,
              body: [
                cause,
                '',
                'Check the [workflow run](' +
                  context.serverUrl + '/' + context.repo.owner + '/' +
                  context.repo.repo + '/actions/runs/' + context.runId +
                ') and `sprints/active.yml`.',
                '',
                '_This issue stays open until resolved; the workflow will not file duplicates._',
              ].join('\n'),
              labels: ['lisa', 'evaluation', 'needs-attention'],
            });
