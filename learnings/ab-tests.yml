# A/B test ledger — the self-improving loop's memory.
# Every concluded test gets an entry; scripts/draft_copy.py feeds recent
# learnings into Claude's prompt so future copy builds on what worked.
# Result values: WINNER | LOSER | INCONCLUSIVE (all three are learnings).
#
# Protocol (pre-registered, per test):
#   - ONE primary metric, declared before launch (usually add-to-cart rate)
#   - Fixed horizon in full weeks, computed from the MDE table — no peeking-
#     to-stop; the app's significance % is read only AT the horizon
#   - Ship rule: >=95% probability AND horizon reached AND guardrails clean
#     (AOV, refund rate, bounce) — otherwise revert and log
#   - One test per page; parallel tests only on different surfaces
tests: []
