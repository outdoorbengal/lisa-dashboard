experiments:
  - id: "001"
    name: "Cannibalization fix — Zeppelin redirect"
    sprint_type: RNK
    status: RUNNING
    kpi:
      metric: "zeppelin_ctr"
      display_label: "Zeppelin CTR"
      baseline_value: 41.7
      baseline_display: "41.7%"
      target_value: 46.0
      target_display: "46%"
      unit: "percent"
    timeline:
      started: "2026-04-14"
      evaluation_date: "2026-05-26"
      window_days: 42
    url: "/products/zeppelin-harness"
    rationale: |
      Two pages were competing for the same query cluster. Implemented 301
      redirect from the older generic page to the Zeppelin product page.
      Expecting CTR lift as Google consolidates rankings.
    evaluation:
      success_threshold_pct: 10
      neutral_threshold_pct: 0
    current_reading:
      # Updated by Lisa's weekly scan. Display-only while RUNNING.
      last_measured: null
      current_value: null
      days_elapsed: 5
