- id: '170'
  created: '2026-07-17'
  title: 'Fix checkout completion: 39.4% vs 45-50% benchmark (+$9-17K/mo)'
  url: /
  sprint_type: FUN
  kpi:
    metric: purchase_completion_rate
    display_label: checkout → purchase · 894 checkouts/28d
    current_value: 39.1
    current_display: 39.1% now
    target_value: 45.0
    target_display: 45%+
    unit: percent
  effort:
    level: HIGH
    description: 'Checkout audit: express pay, trust, errors, abandonment flow'
    estimated_minutes: 180
  rationale: '894 shoppers/28d begin checkout; only 352 finish (39.4%) vs a 45-50%
    DTC benchmark. Every point of completion is ~$1.6K/mo: reaching 45% = +$8.9K/mo,
    50% = +$16.8K/mo. This is the single largest concrete leak in the funnel — shoppers
    at this stage already chose the product.


    Evidence: begin_checkout=894/28d | purchases=352 | completion=39.4% | benchmark=45-50%

    Dashboard impact: $8,884/mo estimated at the 45% target'
  evaluation:
    window_days: 28
    success_threshold_pct: 8
    neutral_threshold_pct: 0
  evidence_urls: []
  _source:
    opportunity_type: FUNNEL_OPTIMIZATION
    detected_at: '2026-07-17T00:00:00Z'
    last_refreshed: '2026-07-18T11:07:17Z'
    dashboard_impact: 8884.0
  revenue_model:
    current:
      impressions_30d: 0
      ctr: 0.0
      sessions_30d: 958
      conversion_rate: 0.394
      aov: 122.68
    projected:
      conversion_rate: 0.45
    confidence: medium
  execution_brief:
    action: Audit and fix the checkout → purchase drop-off (60% of started checkouts
      abandon)
    summary: Shoppers who reach checkout already want the product. Work the standard
      completion levers in order of effort, measuring weekly.
    steps:
    - title: Express payment prominence
      location: Shopify → Settings → Payments + checkout customization
      before: 'Verify: are Shop Pay / Apple Pay / Google Pay shown FIRST at checkout
        on mobile?'
      after: Express wallets above the fold on step one. Shop Pay alone typically
        completes ~1.7x better than manual card entry.
    - title: Kill surprise costs
      location: Checkout settings + shipping zones
      before: 'Shipping cost first revealed at checkout — the #1 stated abandonment
        reason.'
      after: Show shipping cost/threshold on PDP and cart ('Free US shipping over
        $X'); consider folding cost into price if margin allows.
    - title: Check for technical errors
      location: GA4 + Shopify checkout logs
      before: Unknown error rate on payment step (EU cards, address validation).
      after: Segment completion by country and device in GA4; investigate any segment
        completing <30%.
    - title: Abandoned checkout recovery
      location: Shopify → Marketing → Automations
      before: 'Verify the abandoned-checkout email is enabled and firing (ties into
        sprint #164).'
      after: 1h + 24h recovery emails with the cart contents; no discount in the first
        email.
    out_of_scope:
    - No theme redesign; checkout-scoped changes only this sprint.
    definition_of_done: Completion rate measured weekly; +8% relative lift over the
      39.4% baseline within 28 days.
- id: '164'
  created: '2026-07-17'
  title: 'Stand up lifecycle email: post-purchase + winback flows'
  url: /
  sprint_type: FUN
  kpi:
    metric: repeat_rate
    display_label: Repeat-buyer rate · 1,134 customers/365d
