    last_refreshed: '2026-07-18T11:07:17Z'
    dashboard_impact: 6800.0
  revenue_model:
    current:
      impressions_30d: 0
      ctr: 0.0
      sessions_30d: 507
      conversion_rate: 0.04
      aov: 122.68
    projected:
      conversion_rate: 0.15
    confidence: medium
  execution_brief:
    action: 'Build 3 email flows in Klaviyo (or Shopify Email): welcome, post-purchase,
      winback'
    summary: 'The store acquires ~95 new customers/month and loses 96% of them after
      one order. Three automated flows recover the proven ladder: harness buyers →
      leash (160 manual co-purchases/yr), carrier buyers → travel kit, everyone →
      Bootcamp.'
    steps:
    - title: Post-purchase onboarding (fires day 2-7)
      location: Klaviyo → Flows
      before: No post-purchase flow. Median 2nd purchase happens at day 8 — unsupported.
      after: 'Day 2: setup/fit guide for the product bought (cuts returns). Day 5:
        cross-sell the proven pair — Houdini buyers get Kushma leash, Zeppelin buyers
        get Go Litter. Day 12: Cat Bootcamp intro (its buyers repeat at 14%).'
    - title: Welcome flow for non-buyers
      location: Klaviyo → Flows
      before: Signup incentive exists (WELCOMEBACK code used 31×/yr) but no structured
        flow.
      after: '3 emails: brand story + best-seller guide + first-purchase nudge. Personalize
        by landing page category (training blog reader vs product browser).'
    - title: Winback (fires day 45)
      location: Klaviyo → Flows
      before: No winback. 96% of customers never hear from the store again.
      after: 'Day 45: ''How''s the harness working out?'' + review request + ladder
        offer. Non-discount first; discount variant only if no purchase by day 60.'
    out_of_scope:
