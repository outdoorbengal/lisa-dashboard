  execution_brief:
    action: Improve conversion copy on /products/clicker-training-starter-kit
    summary: Product page at /products/clicker-training-starter-kit is receiving organic
      traffic but converting below category median. The intro copy likely buries the
      primary benefit. One focused rewrite of the first paragraph plus above-the-fold
      positioning should move CR.
    steps:
    - title: Rewrite first paragraph of product description
      location: Shopify → Products → clicker-training-starter-kit → Description
      before: (could not fetch — check Shopify)
      after: 'Here''s the current opening:


        > *"Take your cat training to the next level with the help of our training
        kit! All the tools and guidance you need to get started, and the tips, tricks,
        and fun activities to help you teach your feline friend proper behaviors,
        cute tricks, and strengthen the bond between you two in the process."*


        The #1 benefit buried at the end is the **bond** — which is the real emotional
        hook. Here''s the rewrite:


        ---


        **Option A (bond-first, warm):**

        > The best thing clicker training does isn''t teaching tricks — it''s changing
        your relationship with your cat. This kit gives you everything to start: a
        quiet clicker, target stick, treats pouch, and a step-by-step guide built
        for real cats and real beginners.


        ---


        **Option B (outcome-first, punchy):**

        > A cat that actually listens — and a relationship you didn''t know was possible.
        That''s what clicker training unlocks. This starter kit has everything you
        need to get there: quiet clicker, target stick, treats pouch, and a beginner-friendly
        guide.


        ---


        **Option C (problem-first, relatable):**

        > Most cats aren''t stubborn — they just haven''t been taught the right way.
        Clicker training changes that, and this kit makes it easy to start today.
        Quiet clicker, target stick, treats pouch, and a step-by-step guide included.


        ---


        My pick: **Option A** — it leads with the emotional truth (the bond), flows
        naturally, and doesn''t sound like ad copy. Want me to push one of these live?'
      note: 'Lead with the #1 benefit, not brand name. Make the first sentence scannable.'
    out_of_scope:
    - Do not touch the SEO title or meta description (separate test).
    - Do not add more than one structural change in this sprint.
    definition_of_done: 'Updated copy is live at https://www.outdoorbengal.com/products/clicker-training-starter-kit.
      First paragraph leads with the primary benefit. Reply DONE - #012.'
