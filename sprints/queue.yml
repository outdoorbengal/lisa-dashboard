        **Option B: SEO title/meta rewrite (what the skill does)**

        If you want me to rewrite the **`<title>`** tag and **meta description** for this page to improve
        its Google CTR, I''d need:

        - GSC export showing this page''s query, position, CTR, and impressions

        - OR just tell me the primary query you want this page to rank for, and I''ll write an optimized
        title/meta based on current best practices


        ---


        **My read:** You wanted Option A (page copy), and I already gave you that. The skill loaded because
        the term "rewrite" triggered it, but it''s the wrong tool for body copy.


        Confirm which one you need, or let me know if the page copy rewrite I provided works and we''re
        done here.'
      note: 'Lead with the #1 benefit, not brand name. Make the first sentence scannable.'
