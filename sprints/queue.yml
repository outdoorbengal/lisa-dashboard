    description: 'Email flows: welcome, post-purchase onboarding, winback'
    estimated_minutes: 240
  rationale: 'Only 4.1% of 1,134 customers ever buy again (DTC pet benchmark: repeat
    = 15-25% of revenue). At the current ~$62K/mo run-rate, repeat orders contribute
    ~$2.5K/mo (4%) vs ~$9.3K/mo at a conservative 15% benchmark — a ~$6.8K/mo steady-state
    gap. Buyers who DO return come back fast (median 8 days), so week-one flows capture
    most of it. Email-attributed orders today: ~2/28d. The ladder is proven by co-purchase
    data: harness -> leash -> carrier ($286-LTV cohort) -> Bootcamp (14% repeat).


    Evidence: repeat_rate=4.1% | repeat_rev_share=4% vs 15% benchmark | median_days_to_2nd=8
    | email_orders_28d~2

    Dashboard impact: $6,800/mo steady-state estimated (ramps over ~2 quarters as
    cohorts stack)'
  evaluation:
    window_days: 90
    success_threshold_pct: 50
    neutral_threshold_pct: 0
  evidence_urls: []
