<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lisa · OutdoorBengal</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate" class="gate hidden">
  <div class="gate-card">
    <div class="gate-logo">🐾</div>
    <div class="gate-title">Lisa</div>
    <div class="gate-sub">SEO & growth agent · OutdoorBengal.com</div>
    <button id="login-btn" class="gate-btn">Sign in with GitHub</button>
    <div class="gate-fine">Only authorized GitHub users can trigger sprint actions.</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <span class="loading-text">Loading</span>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden"></div>

<!-- SPRINT DETAIL MODAL -->
<div id="modal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <button class="modal-close" data-close aria-label="Close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- LOG VIEWER MODAL -->
<div id="logmodal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" data-close-log></div>
  <div class="modal-panel modal-wide" role="dialog" aria-modal="true">
    <button class="modal-close" data-close-log aria-label="Close">✕</button>
    <div class="logmodal-header">
      <div>
        <div class="modal-title">Run log</div>
        <div class="modal-sub">Most recent 50 runs</div>
      </div>
      <div class="log-filters">
        <button class="log-filter active" data-filter="all">All</button>
        <button class="log-filter" data-filter="daily_scan">Scans</button>
        <button class="log-filter" data-filter="sprint_started">Sprint started</button>
        <button class="log-filter" data-filter="sprint_evaluated">Evaluated</button>
        <button class="log-filter" data-filter="warning,error">Issues</button>
      </div>
    </div>
    <div id="log-rows" class="log-rows"></div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div id="confirm" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop"></div>
  <div class="modal-panel modal-sm" role="dialog" aria-modal="true">
    <div class="confirm-title" id="confirm-title">Confirm</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-input-wrap hidden" id="confirm-input-wrap">
      <label class="confirm-label" for="confirm-input">Reason (optional)</label>
      <input class="confirm-input" id="confirm-input" type="text" placeholder="">
    </div>
    <div class="confirm-btns">
      <button class="cbtn cbtn-ghost" id="confirm-cancel">Cancel</button>
      <button class="cbtn cbtn-primary" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="./config.js"></script>
<script src="./auth.js"></script>
<script src="./app.js"></script>
</body>
</html>
