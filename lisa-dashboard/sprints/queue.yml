# Sprint queue — pending sprints awaiting approval.
# Lisa appends to this file when she discovers a new opportunity.
# The build workflow reads this to populate the dashboard's Sprints section.
#
# Ordering: first item = top priority (UNACKNOWLEDGED).
# Second item = NEXT_UP. Further items are hidden from the main dashboard
# but visible on the queue detail page.
#
# When the user clicks DONE on the dashboard, the sprint-action workflow
# removes the first item from this list and moves it to active.yml.

sprints:
  - id: "002"
    created: "2026-04-17"
    title: "Add Zeppelin link to cat training guide"
    url: "/blogs/clicker-training-cats/cat-training-guide"
    sprint_type: LINK  # RNK | CTR | CR | LINK
    kpi:
      metric: "referral_sessions_to_zeppelin"
      display_label: "Referral sessions to Zeppelin"
      current_value: 0
      current_display: "~0 now"
      target_value: 25
      target_display: "+25/wk"
      unit: "sessions/week"
    effort:
      level: LOW
      description: "1 sentence + link"
      estimated_minutes: 15
    rationale: |
      Cat training guide currently ranks position 4 for "clicker training cats"
      with ~1.2k monthly impressions. Zero internal links point to the Zeppelin
      product page. Adding a contextual link in the "tools you'll need" section
      should drive meaningful referral traffic.
    evaluation:
      window_days: 21
      success_threshold_pct: 10  # +10% over baseline = WINNER
      neutral_threshold_pct: 0   # 0-10% = NEUTRAL; <0 = LOSER
    evidence_urls:
      - "https://search.google.com/search-console/..."

  - id: "003"
    created: "2026-04-19"
    title: "Fix title tag — best cat names article"
    url: "/blogs/fun-stuff/best-cat-names"
    sprint_type: CTR
    kpi:
      metric: "ctr"
      display_label: "CTR · 114K impressions · pos 12.6"
      current_value: 0.27
      current_display: "0.27% now"
      target_value: 1.0
      target_display: "1%+"
      unit: "percent"
    effort:
      level: LOW
      description: "Title tag rewrite"
      estimated_minutes: 10
    rationale: |
      Article has 114K impressions at average position 12.6 but CTR of 0.27%
      is well below the positional benchmark of ~2%. Current title is
      generic. Testing a more specific, benefit-driven title.
    evaluation:
      window_days: 28
      success_threshold_pct: 50
      neutral_threshold_pct: 0
